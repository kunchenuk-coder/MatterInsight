
<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>物见 | Matter Insight</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .masonry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      grid-auto-rows: 10px;
    }
    .moodboard-canvas {
      background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .moodboard-canvas::-webkit-scrollbar {
      height: 8px;
      width: 8px;
    }
    .moodboard-canvas::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .moodboard-canvas::-webkit-scrollbar-thumb {
      background: #000;
      border-radius: 10px;
    }
    .moodboard-canvas::-webkit-scrollbar-thumb:hover {
      background: #333;
    }
  </style>
